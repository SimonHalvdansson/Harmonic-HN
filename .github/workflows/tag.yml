name: tag

on:
  push:
    tags:
      - 'v*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BUNDLETOOL_VERSION: '1.18.3'
      BUNDLETOOL_SHA256: 'A099CFA1543F55593BC2ED16A70A7C67FE54B1747BB7301F37FDFD6D91028E29'
      RELEASE_UNSIGNED_APK: app/build/outputs/apk/foss/release/app-foss-release-unsigned.apk
      RELEASE_ALIGNED_APK: app/build/outputs/apk/foss/release/app-release-aligned.apk
      RELEASE_SIGNED_APK: app/build/outputs/apk/foss/release/app-release.apk
      RELEASE_BUNDLE: app/build/outputs/bundle/playRelease/app-play-release.aab
      RELEASE_LLM_APKS: app/build/outputs/apk/play/release/app-release-llm.apks
      RELEASE_LLM_APK: app/build/outputs/apk/play/release/app-release-llm.apk
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
      - name: Install native build tools
        run: sdkmanager "ndk;29.0.13113456" "cmake;3.22.1"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: >-
          ./gradlew
          :app:assembleFossRelease
          :app:bundlePlayRelease
          :app:lintFossRelease
          :app:lintPlayRelease
          :app:verifyFossDependencies
          --warning-mode all
          --no-daemon
          --parallel
      - name: Sign release APKs
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          ANDROID_SIGNING_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "$ANDROID_SIGNING_KEYSTORE_BASE64" || -z "$ANDROID_SIGNING_KEYSTORE_PASSWORD" || -z "$ANDROID_SIGNING_KEY_ALIAS" || -z "$ANDROID_SIGNING_KEY_PASSWORD" ]]; then
            echo "::error::Missing one or more Android signing secrets."
            exit 1
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/release-keystore.jks"
          KEYSTORE_PASSWORD_FILE="$RUNNER_TEMP/keystore-password.txt"
          KEY_PASSWORD_FILE="$RUNNER_TEMP/key-password.txt"
          BUNDLETOOL_JAR="$RUNNER_TEMP/bundletool.jar"
          echo "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          printf '%s' "$ANDROID_SIGNING_KEYSTORE_PASSWORD" > "$KEYSTORE_PASSWORD_FILE"
          printf '%s' "$ANDROID_SIGNING_KEY_PASSWORD" > "$KEY_PASSWORD_FILE"
          chmod 600 "$KEYSTORE_PATH" "$KEYSTORE_PASSWORD_FILE" "$KEY_PASSWORD_FILE"

          curl -fsSL \
            "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar" \
            -o "$BUNDLETOOL_JAR"
          echo "${BUNDLETOOL_SHA256}  ${BUNDLETOOL_JAR}" | sha256sum --check -

          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$BUILD_TOOLS_DIR/zipalign" -p -f 4 "$RELEASE_UNSIGNED_APK" "$RELEASE_ALIGNED_APK"
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "$ANDROID_SIGNING_KEY_ALIAS" \
            --ks-pass env:ANDROID_SIGNING_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_SIGNING_KEY_PASSWORD \
            --out "$RELEASE_SIGNED_APK" \
            "$RELEASE_ALIGNED_APK"
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose --print-certs "$RELEASE_SIGNED_APK"

          java -jar "$BUNDLETOOL_JAR" build-apks \
            --bundle="$RELEASE_BUNDLE" \
            --output="$RELEASE_LLM_APKS" \
            --mode=universal \
            --ks="$KEYSTORE_PATH" \
            --ks-pass="file:$KEYSTORE_PASSWORD_FILE" \
            --ks-key-alias="$ANDROID_SIGNING_KEY_ALIAS" \
            --key-pass="file:$KEY_PASSWORD_FILE" \
            --overwrite
          unzip -p "$RELEASE_LLM_APKS" universal.apk > "$RELEASE_LLM_APK"
          unzip -t "$RELEASE_LLM_APK" 'lib/*/liblocal-llama.so'
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose --print-certs "$RELEASE_LLM_APK"
      - uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            app/build/outputs/apk/foss/release/app-release.apk
            app/build/outputs/apk/play/release/app-release-llm.apk
          draft: false
          prerelease: false

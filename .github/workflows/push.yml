on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUNDLETOOL_VERSION: '1.18.3'
      BUNDLETOOL_SHA256: 'A099CFA1543F55593BC2ED16A70A7C67FE54B1747BB7301F37FDFD6D91028E29'
      RELEASE_BUNDLE: app/build/outputs/bundle/release/app-release.aab
      CI_LLM_APKS: app/build/outputs/apk/release/app-release-llm-ci.apks
      CI_LLM_APK: app/build/outputs/apk/release/app-release-llm-ci.apk
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
      - name: Install native build tools
        run: sdkmanager "ndk;29.0.13113456" "cmake;3.22.1"
      - name: Build with Gradle
        run: ./gradlew build :app:bundleRelease --warning-mode all --no-daemon --parallel
      - name: Build fused LLM APK
        run: |
          set -euo pipefail

          BUNDLETOOL_JAR="$RUNNER_TEMP/bundletool.jar"
          KEYSTORE_PATH="$RUNNER_TEMP/ci-debug.jks"
          KEYSTORE_PASSWORD_FILE="$RUNNER_TEMP/ci-keystore-password.txt"
          KEY_PASSWORD_FILE="$RUNNER_TEMP/ci-key-password.txt"

          curl -fsSL \
            "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar" \
            -o "$BUNDLETOOL_JAR"
          echo "${BUNDLETOOL_SHA256}  ${BUNDLETOOL_JAR}" | sha256sum --check -

          printf '%s' 'android' > "$KEYSTORE_PASSWORD_FILE"
          printf '%s' 'android' > "$KEY_PASSWORD_FILE"
          keytool -genkeypair -noprompt \
            -keystore "$KEYSTORE_PATH" \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          java -jar "$BUNDLETOOL_JAR" build-apks \
            --bundle="$RELEASE_BUNDLE" \
            --output="$CI_LLM_APKS" \
            --mode=universal \
            --ks="$KEYSTORE_PATH" \
            --ks-pass="file:$KEYSTORE_PASSWORD_FILE" \
            --ks-key-alias=androiddebugkey \
            --key-pass="file:$KEY_PASSWORD_FILE" \
            --overwrite
          unzip -p "$CI_LLM_APKS" universal.apk > "$CI_LLM_APK"
          unzip -t "$CI_LLM_APK" 'lib/*/liblocal-llama.so'
      - uses: actions/upload-artifact@v7
        with:
          name: apks
          path: |
            app/build/outputs/apk
            app/build/outputs/bundle/release/app-release.aab

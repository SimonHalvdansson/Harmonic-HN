Builds:
  - versionName: '2.4'
    versionCode: 74
    commit: v2.4
    subdir: app
    sudo:
      - echo "deb https://deb.debian.org/debian trixie main" > /etc/apt/sources.list.d/trixie.list
      - apt-get update
      - apt-get install -y -t trixie openjdk-21-jdk-headless
      - update-alternatives --auto java
    gradle:
      - yes
    rm:
      - app/release
      - gradle/gradle-daemon-jvm.properties
    prebuild: sed -i -e '/foojay/d' ../settings.gradle

AllowedAPKSigningKeys: fb12dbf6d0692512ed7018150637a1932eab09d67dbf9900457096a552f88ec6

MaintainerNotes: |-
  The upstream release tree contains Play/GitHub release artifacts under app/release;
  remove them before scanner/build. The Foojay toolchain resolver is removed because
  the buildserver installs JDK 21 directly.

